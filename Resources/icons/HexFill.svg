<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="6" fill="#2a5080"/>

  <!-- Honeycomb: 7 flat-top hexagons, R≈10 -->
