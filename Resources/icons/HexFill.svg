  <polygon points="18,11 26.66,16 26.66,26 18,31 9.34,26 9.34,16"
           fill="none" stroke="#f0c040" stroke-width="2" stroke-linejoin="round"/>
  <!-- Top-right -->
  <polygon points="46,11 54.66,16 54.66,26 46,31 37.34,26 37.34,16"
           fill="none" stroke="#f0c040" stroke-width="2" stroke-linejoin="round"/>
  <!-- Left -->
  <polygon points="9,31 17.66,36 17.66,46 9,51 0.34,46 0.34,36"
           fill="none" stroke="#f0c040" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right -->
  <polygon points="55,31 63.66,36 63.66,46 55,51 46.34,46 46.34,36"
           fill="none" stroke="#f0c040" stroke-width="2" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <polygon points="18,43 26.66,48 26.66,58 18,63 9.34,58 9.34,48"
           fill="none" stroke="#f0c040" stroke-width="2" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <polygon points="46,43 54.66,48 54.66,58 46,63 37.34,58 37.34,48"
